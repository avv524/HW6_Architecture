groups:
  - name: warehouse-consumer
    rules:
      - alert: WarehouseConsumerLagHigh
        expr: max(consumer_lag) > 5
        for: 30s
        labels:
          severity: warning
        annotations:
          summary: Warehouse consumer lag is high
          description: Consumer lag is above 5 messages for at least 30 seconds.

      - alert: WarehouseCassandraWriteErrors
        expr: increase(cassandra_write_errors_total[1m]) > 0
        for: 0s
        labels:
          severity: critical
        annotations:
          summary: Cassandra write errors detected
          description: The consumer has failed Cassandra writes in the last minute.
