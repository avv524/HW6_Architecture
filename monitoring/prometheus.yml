global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: warehouse-consumer
    metrics_path: /metrics
    static_configs:
      - targets:
          - consumer:8000

  - job_name: warehouse-lag-exporter
    metrics_path: /metrics
    static_configs:
      - targets:
          - lag-exporter:8001
